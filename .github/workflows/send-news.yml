name: Günlük Haber Bildirimi

on:
  schedule:
    # Europe/Berlin 06:00 için DST geçişlerine dayanıklı tetikleme:
    - cron: "0 4 * * *"   # 04:00 UTC = 06:00 Berlin (yaz saati / DST)
    - cron: "0 5 * * *"   # 05:00 UTC = 06:00 Berlin (kış saati / standart)
  workflow_dispatch:        # Manuel tetikleme

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Kodu Kopyala
        uses: actions/checkout@v4

      - name: Java JDK 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Berlin Saati Kontrolü (06:00 filtresi)
        if: github.event_name == 'schedule'
        id: gate
        env:
          TZ: Europe/Berlin
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" = "06" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Berlin saati 06:00, çalışma devam ediyor."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Berlin saati 06:00 değil (şu an: ${HOUR}:00), bu tetikleme atlandı."
          fi

      - name: Haberleri Çek ve Telegram'a Gönder
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mvn -B -ntp clean compile exec:java -Dexec.mainClass=org.example.SendNewsMain
