name: Günlük Asistan Otomasyonu

on:
  schedule:
    # Bu ayar her sabah TR saatiyle 06:00'da çalışır (UTC 03:00)
    # Almanya saati kışın UTC+1, yazın UTC+2 olduğu için saat kayabilir.
    - cron: '0 6 * * *'
  workflow_dispatch: # Bu satır, "Manuel Çalıştır" butonu ekler (Test için)

jobs:
  run-java:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Kopyala
        uses: actions/checkout@v4

      - name: Java JDK 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Maven ile Derle ve Çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
            mvn clean compile
            mvn exec:java -Dexec.mainClass="org.example.Main"